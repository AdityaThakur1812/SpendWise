<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SpendWise</title>
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <div class="container">
      <nav class="navbar">
        <h1>SpendWise</h1>
      </nav>

      <div class="summary">
        <div class="card balance-card">
          <h3>Total Balance</h3>
          <h2 id="balance">RS 0.00</h2>
        </div>

        <div class="card income-card">
          <h3>Income</h3>
          <h2 id="income">RS 0.00</h2>
        </div>

        <div class="card expense-card">
          <h3>Expenses</h3>
          <h2 id="expense">RS 0.00</h2>
        </div>
      </div>

      <div class="chart-container">
        <h2>Expense Analytics</h2>
        <canvas id="expenseChart"></canvas>
      </div>

      <div class="analytics-container">
        <div class="analytics-card">
          <h3>Total Transactions</h3>
          <h2 id="totalTransaction">0</h2>
        </div>

        <div class="analytics-card">
          <h3>Highest Expense</h3>
          <h2 id="highestExpense">₹0</h2>
        </div>

        <div class="analytics-card">
          <h3>Average Expense</h3>
          <h2 id="averageExpense">₹0</h2>
        </div>

        <div class="analytics-card">
          <h3>Top category</h3>
          <h2 id="topCategory">-</h2>
        </div>
      </div>

      <div class="transaction-form">
        <h2>Add Transaction</h2>

        <form id="transactionForm">
          <input type="text" id="title" placeholder="Enter Title" required />

          <input
            type="number"
            id="amount"
            placeholder="Enter Amount"
            required
          />

          <select id="type">
            <option>Income</option>
            <option>Expense</option>
          </select>

          <select id="category">
            <option value="">Select Category</option>
            <option value="Food">🍔 Food</option>
            <option value="Shopping">🛍 Shopping</option>
            <option value="Travel">✈️ Travel</option>
            <option value="Bills">💡 Bills</option>
            <option value="Entertainment">🎬 Entertainment</option>
            <option value="Salary">💼 Salary</option>
          </select>
          <button type="submit">Add Transaction</button>
        </form>
      </div>

      <div class="transactions">
        <p id="emptyMessage">
          No transactions yet. Add your first transaction 🚀
        </p>

        <h2 id="recent">
          Recent Transactions : <span id="transactionCount"></span>
        </h2>
        <div class="filter-container">
          <button class="filter-btn active" data-category="All">All</button>
          <button class="filter-btn" data-category="Food">Food</button>
          <button class="filter-btn" data-category="Shopping">Shopping</button>
          <button class="filter-btn" data-category="Travel">Travels</button>
          <button class="filter-btn" data-category="Bills">Bills</button>
          <button class="filter-btn" data-category="Entertainment">
            Entertainment
          </button>
          <button class="filter-btn" data-category="Salary">Salary</button>
        </div>
        <div class="search-container">
          <span id="filterInfo"></span>
          <input type="text" id="searchInput" placeholder="Search" />
        </div>
        <div class="transaction-list" id="transactionList"></div>
      </div>
      <button id="clearAllBtn">Clear All</button>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="js/charts.js"></script>
    <script src="script.js"></script>
  </body>
</html>
